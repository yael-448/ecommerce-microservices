version: '3.8'

services:
  # ============ INFRASTRUCTURE ============

  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: orders
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: inventory
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      # First-run admin password for Seq (required to start). Change for production.
      SEQ_FIRSTRUN_ADMINPASSWORD: "seqadmin123"
    ports:
      - "5341:5341"
      - "8081:80"

  # ============ MICROSERVICES ============

  order-service:
    build:
      context: ./src/Services/OrderService/OrderService
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=orders-db;Port=5432;Database=orders;Username=postgres;Password=postgres123
      - RabbitMQ__Host=rabbitmq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    depends_on:
      orders-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/orders/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  product-catalog-1:
    build:
      context: ./src/Services/ProductCatalogService/ProductCatalogService
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__Database=productcatalog
      - Redis__ConnectionString=redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  product-catalog-2:
    build:
      context: ./src/Services/ProductCatalogService/ProductCatalogService
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__Database=productcatalog
      - Redis__ConnectionString=redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  inventory-service:
    build:
      context: ./src/Services/InventoryService/InventoryService
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=inventory-db;Port=5432;Database=inventory;Username=postgres;Password=postgres123
      - RabbitMQ__Host=rabbitmq
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/inventory/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  notification-service:
    build:
      context: ./src/Services/NotificationService/NotificationService
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__ConnectionString=redis:6379
      - RabbitMQ__Host=rabbitmq
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/notifications/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============ BFF ============

  bff-service:
    build:
      context: ./src/BFF/BffService
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__OrderService=http://order-service:8080
      - Services__ProductCatalogService=http://product-catalog-1:8080
    depends_on:
      - order-service
      - product-catalog-1

  # ============ API GATEWAY ============

  api-gateway:
    build:
      context: ./src/ApiGateway/ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - order-service
      - product-catalog-1
      - product-catalog-2
      - inventory-service
      - notification-service
      - bff-service

  # ============ LOAD BALANCER (for demo) ============

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - product-catalog-1
      - product-catalog-2
      - api-gateway

volumes:
  orders_db_data:
  inventory_db_data:
  mongo_data:
